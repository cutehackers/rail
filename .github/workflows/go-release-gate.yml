name: Go Release Gate

on:
  workflow_call:
  workflow_dispatch:

jobs:
  go-release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Build rail
        run: go build ./cmd/rail
