name: Release Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  release-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gate: [v1, v2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run release gate
        run: ./tool/release_gate.sh "${{ matrix.gate }}"

