name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release_version
        run: |
          set -euo pipefail
          message="${{ github.event.head_commit.message }}"
          if [[ "$message" =~ release/(v[0-9]+\.[0-9]+\.[0-9]+) ]]; then
            version="${BASH_REMATCH[1]}"
          else
            echo "run_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "reason=not a release merge commit; skipping release" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "reason=release merge commit detected for ${version}" >> "$GITHUB_OUTPUT"

      - name: Release decision summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Release workflow decision"
            echo
            echo "- commit: \`${{ github.sha }}\`"
            echo "- branch: \`${{ github.ref_name }}\`"
            echo "- event: \`${{ github.event_name }}\`"
            echo "- message: \`${{ github.event.head_commit.message }}\`"
            if [[ "${{ steps.release_version.outputs.run_release }}" == "true" ]]; then
              echo "- decision: \`run\`"
              echo "- version: \`${{ steps.release_version.outputs.version }}\`"
              echo "- reason: \`${{ steps.release_version.outputs.reason }}\`"
            else
              echo "- decision: \`skip\`"
              echo "- reason: \`${{ steps.release_version.outputs.reason }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ steps.release_version.outputs.run_release }}" == "true" ]]; then
            echo "::notice ::release workflow will run for version ${{ steps.release_version.outputs.version }}"
          else
            echo "::notice ::release workflow skipped: ${{ steps.release_version.outputs.reason }}"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
        if: steps.release_version.outputs.run_release == 'true'

      - name: Prepare release preflight
        if: steps.release_version.outputs.run_release == 'true'
        run: ./tool/prepare_release.sh "${{ steps.release_version.outputs.version }}" --preflight-only --allow-existing-tag
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Create tag and verify release
        if: steps.release_version.outputs.run_release == 'true'
        run: ./tool/prepare_release.sh "${{ steps.release_version.outputs.version }}" --push --allow-existing-tag
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        if: steps.release_version.outputs.run_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Attest release checksums
        uses: actions/attest@v4
        with:
          subject-path: dist/checksums.txt
        if: steps.release_version.outputs.run_release == 'true'
