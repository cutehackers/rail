name: V1 Release Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  v1-release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run V1 release gate
        run: ./tool/v1_release_gate.sh
