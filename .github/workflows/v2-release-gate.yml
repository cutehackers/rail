name: V2 Release Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  v2-release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Run V2 release gate
        run: ./tool/v2_release_gate.sh
