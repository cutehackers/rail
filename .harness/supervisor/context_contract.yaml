version: 1

input:
  required_fields:
    - task_type
    - goal
    - context
    - constraints
    - definition_of_done
    - risk_tolerance
  optional_fields:
    - priority
    - related_tests_hint
    - validation_profile

actor_flow_schema:
  planner:
    in:
      - user_request
      - architecture_rules
      - forbidden_changes
    out:
      - plan_yaml_matching_plan_schema

  context_builder:
    in:
      - plan
      - project_rules
      - forbidden_changes
    out:
      - context_pack_yaml_matching_context_pack_schema

  generator:
    in:
      - user_request
      - plan
      - context_pack
      - constraints
    out:
      - implementation_result

  executor:
    in:
      - implementation_result
      - execution_policy
    out:
      - execution_report

  evaluator:
    in:
      - user_request
      - plan
      - context_pack
      - implementation_result
      - execution_report
      - rubric
    out:
      - evaluation_result_yaml_matching_schema_with_reason_codes_and_next_action

  integrator:
    in:
      - user_request
      - implementation_result
      - execution_report
      - evaluation_result
    out:
      - integration_result

workflow_semantics:
  evaluator_pass_controls_supervisor_decision: true
  evaluator_is_the_conservative_production_gate: true
  integrator_role: post_pass_handoff_only
  integrator_must_not_change_supervisor_decision: true
  integrator_runs_after_pass_when_present: true
  corrective_actions_are_quality_interventions: true
  another_corrective_cycle_requires_current_state_refresh_before_next_generator_attempt: true
  launch_scope:
    core_supervisor_gate:
      - planner
      - context_builder
      - generator
      - executor
      - evaluator
    post_pass_handoff:
      - integrator

termination:
  conditions:
    - evaluator_decision == reject
    - retries_exhausted == true
    - evaluator_decision == pass_and_workflow_has_no_integrator
    - integrator_completed_after_evaluator_pass == true
