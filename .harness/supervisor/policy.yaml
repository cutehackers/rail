version: 1

global:
  max_files_per_task: 6
  max_generator_retry: 2
  require_related_tests: true
  require_analyze_pass: true
  prefer_minimal_diff: true

split_task_if:
  - likely_files_count > 6
  - multiple_unrelated_features == true
  - requires_public_api_change_and_ui_change_and_data_change == true

retry_rules:
  low:
    max_generator_retry: 1
  medium:
    max_generator_retry: 2
  high:
    max_generator_retry: 2

reject_if:
  - constraints_violated == true
  - forbidden_files_touched == true
  - unrelated_large_blast_radius == true

revise_if:
  - definition_of_done_not_satisfied == true
  - analyze_failed == true
  - related_tests_failed == true
  - architecture_violation == true
  - test_coverage_insufficient == true
  - missing_risk_explanation == true

pass_if:
  - definition_of_done_satisfied == true
  - analyze_passed == true
  - related_tests_passed == true
  - architecture_accepted == true

