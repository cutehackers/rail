type: object
required:
  - relevant_files
  - repo_patterns
  - forbidden_changes

properties:
  relevant_files:
    type: array
    items:
      type: object
      required:
        - path
        - why
      properties:
        path:
          type: string
        why:
          type: string

  repo_patterns:
    type: array
    items:
      type: string

  test_patterns:
    type: array
    items:
      type: string

  forbidden_changes:
    type: array
    items:
      type: string

  implementation_hints:
    type: array
    items:
      type: string

