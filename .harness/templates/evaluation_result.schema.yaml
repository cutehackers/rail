type: object
required:
  - decision
  - findings
  - reason_codes

properties:
  decision:
    type: string
    enum:
      - pass
      - revise
      - reject

  scores:
    type: object
    properties:
      requirements:
        type: number
        minimum: 0
        maximum: 1
      architecture:
        type: number
        minimum: 0
        maximum: 1
      regression_risk:
        type: number
        minimum: 0
        maximum: 1

  findings:
    type: array
    items:
      type: string

  reason_codes:
    type: array
    items:
      type: string

  next_action:
    type: string
    enum:
      - revise_generator
      - rebuild_context
      - tighten_validation
      - split_task
      - block_environment
