type: object
required:
  - decision
  - findings
  - next_action

properties:
  decision:
    type: string
    enum:
      - pass
      - revise
      - reject

  scores:
    type: object
    properties:
      requirements:
        type: number
        minimum: 0
        maximum: 1
      architecture:
        type: number
        minimum: 0
        maximum: 1
      regression_risk:
        type: number
        minimum: 0
        maximum: 1

  findings:
    type: array
    items:
      type: string

  next_action:
    oneOf:
      - type: string
      - type: array
        items:
          type: string

