type: object
required:
  - format
  - analyze
  - tests
  - failure_details
  - logs

properties:
  format:
    type: string
    enum:
      - pass
      - fail

  analyze:
    type: string
    enum:
      - pass
      - fail

  tests:
    type: object
    required:
      - total
      - passed
      - failed
    properties:
      total:
        type: integer
      passed:
        type: integer
      failed:
        type: integer

  failure_details:
    type: array
    items:
      type: string

  logs:
    type: array
    items:
      type: string

