type: object
required:
  - summary
  - files_changed
  - validation
  - risks
  - follow_up
  - evidence_quality
  - release_readiness
  - blocking_issues

properties:
  summary:
    type: string
    description: Concise explanation of what changed and why merge handoff is needed.

  files_changed:
    type: array
    items:
      type: string
    description: Paths that were intentionally modified since last validated state.

  validation:
    type: array
    items:
      type: object
      required:
        - check_name
        - status
        - evidence
        - command
        - details
      properties:
        check_name:
          type: string
        status:
          type: string
          enum:
            - pass
            - fail
            - warning
            - blocked
            - not_run
        command:
          type:
            - string
            - 'null'
        evidence:
          type: string
        details:
          type:
            - string
            - 'null'

  risks:
    type: array
    items:
      type: object
      required:
        - description
        - severity
        - mitigation
      properties:
        description:
          type: string
        severity:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        mitigation:
          type:
            - string
            - 'null'

  follow_up:
    type: array
    items:
      type: object
      required:
        - action
        - owner
        - due
        - notes
      properties:
        action:
          type: string
        owner:
          type: string
        due:
          type:
            - string
            - 'null'
        notes:
          type:
            - string
            - 'null'

  evidence_quality:
    type: string
    enum:
      - draft
      - adequate
      - high_confidence

  release_readiness:
    type: string
    enum:
      - blocked
      - conditional
      - ready

  blocking_issues:
    type: array
    items:
      type: string
