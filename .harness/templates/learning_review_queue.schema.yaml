type: object
required:
  - pending_candidate_groups
  - queue_generated_at
properties:
  pending_candidate_groups:
    type: array
    items:
      type: object
      required:
        - task_family
        - task_family_source
        - direct_user_outcome_status
        - last_disposition_state
        - pending_candidate_refs
        - appended_user_outcome_feedback_refs
        - reviewable_candidate_dispositions
      properties:
        task_family:
          type: string
        task_family_source:
          type: string
        direct_user_outcome_status:
          type: string
          enum:
            - accepted
            - corrected
            - unresolved
            - unknown
        last_disposition_state:
          type: string
          enum:
            - pending
            - promote
            - hold
            - reject
        latest_review_decision_ref:
          type:
            - string
            - 'null'
        pending_candidate_refs:
          type: array
          items:
            type: string
        appended_user_outcome_feedback_refs:
          type: array
          items:
            type: string
        reviewable_candidate_dispositions:
          type: array
          items:
            type: object
            required:
              - candidate_ref
              - user_outcome_status
              - appended_user_outcome_feedback_refs
              - disposition_state
              - review_window_status
            properties:
              candidate_ref:
                type: string
              user_outcome_status:
                type: string
                enum:
                  - confirmed
                  - provisional
                  - unavailable
              appended_user_outcome_feedback_refs:
                type: array
                items:
                  type: string
              disposition_state:
                type: string
                enum:
                  - pending
                  - promote
                  - hold
                  - reject
                  - expired
              latest_review_decision_ref:
                type:
                  - string
                  - 'null'
              latest_review_decision_timestamp:
                type: string
              review_window_status:
                type: string
                enum:
                  - awaiting_feedback
                  - ready_for_review
                  - reviewed
                  - expired
            allOf:
              - if:
                  properties:
                    disposition_state:
                      const: pending
                then:
                  properties:
                    latest_review_decision_ref:
                      type:
                        - string
                        - 'null'
              - if:
                  properties:
                    disposition_state:
                      enum:
                        - promote
                        - hold
                        - reject
                        - expired
                then:
                  required:
                    - latest_review_decision_ref
                  properties:
                    latest_review_decision_ref:
                      type: string
                    latest_review_decision_timestamp:
                      type: string
            additionalProperties: false
        latest_review_decision_timestamp:
          type: string
      allOf:
        - if:
            properties:
              last_disposition_state:
                const: pending
          then:
            properties:
              latest_review_decision_ref:
                type:
                  - string
                  - 'null'
        - if:
            properties:
              last_disposition_state:
                enum:
                  - promote
                  - hold
                  - reject
          then:
            required:
              - latest_review_decision_ref
            properties:
              latest_review_decision_ref:
                type: string
      additionalProperties: false

  queue_generated_at:
    type: string

  queue_sequence:
    type: integer
additionalProperties: false
