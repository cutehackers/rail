type: object
required:
  - task_type
  - goal
  - context
  - constraints
  - definition_of_done
  - risk_tolerance

properties:
  task_type:
    type: string
    enum:
      - bug_fix
      - feature_addition
      - safe_refactor
      - test_repair

  goal:
    type: string

  context:
    type: object
    properties:
      feature:
        type: string
      suspected_files:
        type: array
        items:
          type: string
      related_files:
        type: array
        items:
          type: string

  constraints:
    type: array
    items:
      type: string

  definition_of_done:
    type: array
    items:
      type: string

  priority:
    type: string
    enum:
      - low
      - medium
      - high

  risk_tolerance:
    type: string
    enum:
      - low
      - medium
      - high

  validation_profile:
    type: string
    enum:
      - standard
      - smoke
