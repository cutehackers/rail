routes:
  bug_fix:
    actors:
      - planner
      - context_builder
      - critic
      - generator
      - executor
      - evaluator

  feature_addition:
    actors:
      - planner
      - context_builder
      - critic
      - generator
      - executor
      - evaluator

  safe_refactor:
    actors:
      - planner
      - context_builder
      - critic
      - generator
      - executor
      - evaluator

  test_repair:
    actors:
      - planner
      - context_builder
      - critic
      - generator
      - executor
      - evaluator

defaults:
  risk_tolerance:
    low:
      prefer_minimal_diff: true
      retry_budget: 1
    medium:
      prefer_minimal_diff: true
      retry_budget: 2
    high:
      prefer_minimal_diff: false
      retry_budget: 2
