type: object
required:
  - task_family
  - task_family_source
  - approved_observation
  - applicability_conditions
  - evidence_basis
  - guardrail_note
  - request_compatibility
  - repository_compatibility
  - latest_family_evidence_expectations
  - freshness_marker
  - disposition_history
  - originating_candidate_refs
  - reviewed_user_outcome_feedback_refs
properties:
  task_family:
    type: string

  task_family_source:
    type: string

  approved_observation:
    type: string

  applicability_conditions:
    type: array
    items:
      type: string

  evidence_basis:
    type: array
    items:
      type: string

  guardrail_note:
    type: string

  request_compatibility:
    type: object
    required:
      - required_context_features
      - goal_must_include_any
      - goal_must_exclude_any
      - constraint_must_include_any
      - constraint_must_exclude_any
    properties:
      required_context_features:
        type: array
        minItems: 1
        items:
          type: string
      goal_must_include_any:
        type: array
        minItems: 1
        items:
          type: string
      goal_must_exclude_any:
        type: array
        items:
          type: string
      constraint_must_include_any:
        type: array
        items:
          type: string
      constraint_must_exclude_any:
        type: array
        items:
          type: string
    additionalProperties: false

  repository_compatibility:
    type: object
    required:
      - required_paths_exist
      - required_paths_absent
    properties:
      required_paths_exist:
        type: array
        minItems: 1
        items:
          type: string
      required_paths_absent:
        type: array
        items:
          type: string
    additionalProperties: false

  latest_family_evidence_expectations:
    type: object
    required:
      - lookup_key
      - baseline_approved_memory_ref
      - required_latest_success_ref
      - required_latest_failure_ref
      - forbid_any_latest_failure
    properties:
      lookup_key:
        type: string
      baseline_approved_memory_ref:
        type: string
      required_latest_success_ref:
        type:
          - string
          - 'null'
      required_latest_failure_ref:
        type:
          - string
          - 'null'
      forbid_any_latest_failure:
        type: boolean
    additionalProperties: false

  freshness_marker:
    type: object
    required:
      - contract_version
      - policy_version
      - memory_schema_version
      - repository_assumptions_ref
      - repository_state_ref
      - refreshed_at
      - freshness_sequence
    properties:
      contract_version:
        type: integer
      policy_version:
        type: integer
      memory_schema_version:
        type: integer
      repository_assumptions_ref:
        type: string
      repository_state_ref:
        type: string
      refreshed_at:
        type: string
      freshness_sequence:
        type: integer
    additionalProperties: false

  disposition_history:
    type: array
    items:
      type: object
      required:
        - disposition
        - decided_at
        - decision_ref
        - reviewer_identity
      properties:
        disposition:
          type: string
          enum:
            - approved
            - held
            - rejected
            - superseded
        decided_at:
          type: string
        decision_ref:
          type: string
        reviewer_identity:
          type: string
        reason:
          type: string
      additionalProperties: false

  originating_candidate_refs:
    type: array
    items:
      type: string

  reviewed_user_outcome_feedback_refs:
    type: array
    items:
      type: string
additionalProperties: false
