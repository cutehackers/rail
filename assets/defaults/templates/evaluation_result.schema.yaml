type: object
required:
  - decision
  - evaluated_input_digest
  - findings
  - reason_codes
  - quality_confidence

properties:
  decision:
    type: string
    enum:
      - pass
      - revise
      - reject

  evaluated_input_digest:
    type: string
    pattern: '^sha256:'

  scores:
    type: object
    properties:
      requirements:
        type: number
        minimum: 0
        maximum: 1
      architecture:
        type: number
        minimum: 0
        maximum: 1
      regression_risk:
        type: number
        minimum: 0
        maximum: 1

  findings:
    type: array
    items:
      type: string

  reason_codes:
    type: array
    items:
      type: string

  quality_confidence:
    type: string
    enum:
      - high
      - medium
      - low

  next_action:
    type: string
    enum:
      - revise_generator
      - rebuild_context
      - tighten_validation
      - split_task
      - block_environment
