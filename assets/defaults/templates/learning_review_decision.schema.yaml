type: object
required:
  - candidate_ref
  - candidate_user_outcome_status_at_review
  - reviewer_decision
  - reviewer_identity
  - decision_timestamp
  - decision_reason
  - guardrail_cost_predicate
properties:
  candidate_ref:
    type: string

  candidate_user_outcome_status_at_review:
    type: string
    enum:
      - confirmed
      - provisional
      - unavailable

  reviewer_decision:
    type: string
    enum:
      - promote
      - hold
      - reject

  reviewer_identity:
    type: string

  decision_timestamp:
    type: string

  decision_reason:
    type: string

  considered_user_outcome_feedback_refs:
    type: array
    items:
      type: string

  resulting_approved_memory_ref:
    type: string

  guardrail_cost_predicate:
    type: object
    required:
      - assessment
      - rationale
    properties:
      assessment:
        type: string
        enum:
          - intervention_cost_explains_apparent_improvement
          - intervention_cost_does_not_explain_improvement
          - not_assessed
      rationale:
        type: string
      excessive_intervention_cost_refs:
        type: array
        items:
          type: string
    additionalProperties: false

allOf:
  - if:
      properties:
        reviewer_decision:
          const: promote
    then:
      required:
        - resulting_approved_memory_ref
additionalProperties: false
