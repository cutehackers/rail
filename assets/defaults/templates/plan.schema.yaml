type: object
required:
  - summary
  - likely_files
  - substeps
  - risks
  - acceptance_criteria_refined

properties:
  summary:
    type: string

  likely_files:
    type: array
    items:
      type: string

  assumptions:
    type: array
    items:
      type: string

  substeps:
    type: array
    items:
      type: string

  risks:
    type: array
    items:
      type: string

  acceptance_criteria_refined:
    type: array
    items:
      type: string

