type: object
required:
  - format
  - analyze
  - tests
  - failure_details
  - logs

properties:
  format:
    type: string
    enum:
      - pass
      - fail

  analyze:
    type: string
    enum:
      - pass
      - fail

  tests:
    type: object
    required:
      - total
      - passed
      - failed
    properties:
      total:
        type: integer
      passed:
        type: integer
      failed:
        type: integer

  failure_details:
    type: array
    items:
      type: string

  logs:
    type: array
    items:
      type: string

  executed_intervention_count:
    type: integer

  context_refresh:
    type: object
    properties:
      count:
        type: integer
      last_trigger:
        type:
          - string
          - 'null'
      last_reason_family:
        type:
          - string
          - 'null'

  guardrail_cost:
    type: object
    properties:
      generator_revisions_used:
        type: integer
      context_rebuilds_used:
        type: integer
      validation_tightenings_used:
        type: integer

  guardrail_value:
    type: object
    properties:
      trigger_failure_or_risk:
        type: string
      trigger_reason_codes:
        type: array
        items:
          type: string
      trigger_reason_category:
        type:
          - string
          - 'null'
      last_intervention:
        type: string
      quality_confidence:
        type: string
        enum:
          - high
          - medium
          - low
      outcome:
        type: string

  terminal_status:
    type: string

  quality_learning_candidate_refs:
    type: array
    items:
      type: string

  hardening_candidate_refs:
    type: array
    items:
      type: string

  approved_memory_consideration:
    type: object
    required:
      - considered_ref
      - lookup_key
      - task_family_source
      - disposition
      - reasons
      - originating_candidate_refs
      - current_state_refresh_ref
    properties:
      considered_ref:
        type: string
      lookup_key:
        type: string
      task_family_source:
        type: string
      disposition:
        type: string
        enum:
          - reuse
          - quarantine
          - drop
      reasons:
        type: array
        items:
          type: string
      originating_candidate_refs:
        type: array
        items:
          type: string
      current_state_refresh_ref:
        type: string
      current_state_refresh_generated_at:
        type:
          - string
          - 'null'

additionalProperties: false
