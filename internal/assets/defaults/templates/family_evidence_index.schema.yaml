type: object
required:
  - latest_approved_memory_refs_by_family
  - latest_confirmed_success_refs_by_family
  - latest_failure_refs_by_family
  - latest_review_decision_refs_by_family
  - latest_provisional_candidate_dispositions_by_family
  - index_generated_at
properties:
  latest_approved_memory_refs_by_family:
    type: object
    additionalProperties:
      type: object
      required:
        - ref
        - recorded_at
        - lookup_key
        - task_family
        - task_family_source
      properties:
        ref:
          type: string
        recorded_at:
          type: string
        lookup_key:
          type: string
        task_family:
          type: string
        task_family_source:
          type: string
        sequence_marker:
          type: integer
      additionalProperties: false

  latest_confirmed_success_refs_by_family:
    type: object
    additionalProperties:
      type: object
      required:
        - ref
        - recorded_at
        - lookup_key
        - task_family
        - task_family_source
      properties:
        ref:
          type: string
        recorded_at:
          type: string
        lookup_key:
          type: string
        task_family:
          type: string
        task_family_source:
          type: string
        sequence_marker:
          type: integer
      additionalProperties: false

  latest_failure_refs_by_family:
    type: object
    additionalProperties:
      type: object
      required:
        - ref
        - recorded_at
        - lookup_key
        - task_family
        - task_family_source
      properties:
        ref:
          type: string
        recorded_at:
          type: string
        lookup_key:
          type: string
        task_family:
          type: string
        task_family_source:
          type: string
        sequence_marker:
          type: integer
      additionalProperties: false

  latest_review_decision_refs_by_family:
    type: object
    additionalProperties:
      type: object
      required:
        - ref
        - recorded_at
        - lookup_key
        - task_family
        - task_family_source
      properties:
        ref:
          type: string
        recorded_at:
          type: string
        lookup_key:
          type: string
        task_family:
          type: string
        task_family_source:
          type: string
        sequence_marker:
          type: integer
      additionalProperties: false

  latest_provisional_candidate_dispositions_by_family:
    type: object
    additionalProperties:
      type: object
      required:
        - ref
        - candidate_ref
        - recorded_at
        - disposition
        - lookup_key
        - task_family
        - task_family_source
      properties:
        ref:
          type: string
        candidate_ref:
          type: string
        recorded_at:
          type: string
        lookup_key:
          type: string
        disposition:
          type: string
          enum:
            - promote
            - hold
            - reject
            - expired
        task_family:
          type: string
        task_family_source:
          type: string
      additionalProperties: false

  index_generated_at:
    type: string

  index_sequence:
    type: integer
additionalProperties: false
