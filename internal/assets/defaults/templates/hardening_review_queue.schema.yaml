type: object
required:
  - pending_hardening_entries
  - queue_generated_at
properties:
  pending_hardening_entries:
    type: array
    items:
      type: object
      required:
        - hardening_candidate_ref
        - policy_affecting_reason
        - review_state
        - task_family
        - task_family_source
      properties:
        hardening_candidate_ref:
          type: string
        policy_affecting_reason:
          type: string
        review_state:
          type: string
          enum:
            - pending
            - accept_for_hardening
            - hold
            - reject
        latest_review_decision_ref:
          type:
            - string
            - 'null'
        task_family:
          type: string
        task_family_source:
          type: string
      allOf:
        - if:
            properties:
              review_state:
                const: pending
          then:
            properties:
              latest_review_decision_ref:
                type:
                  - string
                  - 'null'
        - if:
            properties:
              review_state:
                enum:
                  - accept_for_hardening
                  - hold
                  - reject
          then:
            required:
              - latest_review_decision_ref
            properties:
              latest_review_decision_ref:
                type: string
      additionalProperties: false

  queue_generated_at:
    type: string

  queue_sequence:
    type: integer
additionalProperties: false
