type: object
required:
  - originating_run_artifact_identity
  - candidate_identifier
  - task_family
  - task_family_source
  - quality_outcome_summary
  - user_outcome_signal
  - effective_context_signal
  - effective_validation_signal
  - evaluator_support_signal
  - candidate_claim
  - supporting_evidence_refs
  - guardrail_cost
  - runtime_recommendation
properties:
  originating_run_artifact_identity:
    type: object
    required:
      - run_ref
      - artifact_ref
    properties:
      run_ref:
        type: string
      artifact_ref:
        type: string
    additionalProperties: false

  candidate_identifier:
    type: string

  task_family:
    type: string

  task_family_source:
    type: string

  quality_outcome_summary:
    type: string

  user_outcome_signal:
    type: object
    required:
      - status
    properties:
      status:
        type: string
        enum:
          - confirmed
          - provisional
          - unavailable
      supporting_feedback_refs:
        type: array
        items:
          type: string
      summary:
        type: string
    additionalProperties: false
    allOf:
      - if:
          properties:
            status:
              const: confirmed
        then:
          required:
            - supporting_feedback_refs
          properties:
            supporting_feedback_refs:
              minItems: 1

  effective_context_signal:
    type: object
    required:
      - summary
      - helped_context_factors
      - failed_context_factors
      - neutral_context_factors
    properties:
      summary:
        type: string
      helped_context_factors:
        type: array
        items:
          type: string
      failed_context_factors:
        type: array
        items:
          type: string
      neutral_context_factors:
        type: array
        items:
          type: string
      evidence_refs:
        type: array
        items:
          type: string
      context_factor_refs:
        type: array
        items:
          type: string
    additionalProperties: false

  effective_validation_signal:
    type: object
    required:
      - summary
      - materially_supporting_validation_evidence
      - failed_to_support_validation_evidence
      - contradicting_validation_evidence
    properties:
      summary:
        type: string
      materially_supporting_validation_evidence:
        type: array
        items:
          type: string
      failed_to_support_validation_evidence:
        type: array
        items:
          type: string
      contradicting_validation_evidence:
        type: array
        items:
          type: string
      evidence_refs:
        type: array
        items:
          type: string
      validation_step_refs:
        type: array
        items:
          type: string
    additionalProperties: false

  evaluator_support_signal:
    type: object
    required:
      - quality_confidence
      - final_reason_codes
      - validation_sufficiency_assessment
      - terminal_outcome_class
    properties:
      quality_confidence:
        type: number
        minimum: 0
        maximum: 1
      final_reason_codes:
        type: array
        items:
          type: string
      validation_sufficiency_assessment:
        type: string
        enum:
          - sufficient
          - partial
          - insufficient
      terminal_outcome_class:
        type: string
      supporting_evaluator_notes:
        type: array
        items:
          type: string
    additionalProperties: false

  candidate_claim:
    type: string

  supporting_evidence_refs:
    type: array
    items:
      type: string

  guardrail_cost:
    type: object
    required:
      - summary
    properties:
      summary:
        type: string
      intervention_count:
        type: integer
      intervention_refs:
        type: array
        items:
          type: string
    additionalProperties: false

  runtime_recommendation:
    type: string
    enum:
      - promote
      - hold
      - reject
additionalProperties: false
